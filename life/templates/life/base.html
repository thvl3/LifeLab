{% load static %}
<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}LifeLab{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'life/styles.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    <header class="site-header">
        <a class="brand" href="{% url 'simulator' %}">LifeLab</a>
        <nav aria-label="Primary">
            <a href="{% url 'simulator' %}">Simulator</a>
            <a href="{% url 'library' %}">Library</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
